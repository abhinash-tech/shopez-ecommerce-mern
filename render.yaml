services:
  - type: web
    name: shopez-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: starter # Starter plan recommended to avoid sleep
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # The following variables must be provided in the Render Dashboard
      - key: CLIENT_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM_ADDRESS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
